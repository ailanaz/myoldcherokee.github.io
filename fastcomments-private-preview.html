<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>FastComments</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .fc-wrap { max-width: 980px; margin: 2rem auto; padding: 0 1rem; }
    .fc-card { background: #fff; border: 1px solid #d9d9d9; border-radius: 12px; padding: 1rem; }
    .fc-note { font-size: .9rem; color: #555; margin-bottom: .75rem; }
    .fc-hidden { display: none; }
  </style>
</head>
<body>
  <section class="page-hero" style="padding-top:1.583%;padding-bottom:1.583%;">
    <div class="container">
      <h1>FastComments</h1>
    </div>
  </section>

  <main class="fc-wrap">
    <div id="gate" class="fc-card">
      <p class="fc-note">Private preview page.</p>
      <label for="page-pass">Enter passcode</label>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;">
        <input id="page-pass" type="password" class="filter-input" placeholder="Passcode" />
        <button id="unlock" class="btn btn-red btn-sm" type="button">Open</button>
      </div>
    </div>

    <div id="comments-area" class="fc-hidden">
      <div class="fc-card">
        <p class="fc-note">FastComments preview board</p>
        <div id="fastcomments-widget"></div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      // Basic gate only (not real security on static hosting).
      var PASSCODE = 'oldxjs';
      var gate = document.getElementById('gate');
      var comments = document.getElementById('comments-area');
      var passInput = document.getElementById('page-pass');
      var unlockBtn = document.getElementById('unlock');

      function revealIfAllowed() {
        if (sessionStorage.getItem('fc_preview_ok') === '1') {
          gate.classList.add('fc-hidden');
          comments.classList.remove('fc-hidden');
          loadFastComments();
        }
      }

      function loadFastComments() {
        var s = document.createElement('script');
        s.src = 'https://cdn.fastcomments.com/js/embed-v2.min.js';
        s.onload = function () {
          if (typeof FastCommentsUI !== 'function') return;
          FastCommentsUI(document.getElementById('fastcomments-widget'), {
            tenantId: 'oldxjs',
            urlId: 'oldxjs-fastcomments-private-preview',
            pageTitle: 'OldXJS FastComments Private Preview'
          });
        };
        document.head.appendChild(s);
      }

      unlockBtn.addEventListener('click', function () {
        if ((passInput.value || '').trim() === PASSCODE) {
          sessionStorage.setItem('fc_preview_ok', '1');
          revealIfAllowed();
        } else {
          alert('Incorrect passcode.');
        }
      });

      passInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') unlockBtn.click();
      });

      revealIfAllowed();
    })();
  </script>
</body>
</html>
